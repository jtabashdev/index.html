<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مطعم الكوثر - حجز الطلبات</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5efe6;
      margin: 0;
      padding: 0;
    }

    header {
      background: #8b0000;
      color: white;
      text-align: center;
      padding: 25px;
    }

    .box {
      background: white;
      width: 90%;
      max-width: 550px;
      margin: 25px auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      color: #8b0000;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      height: 80px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #8b0000;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #a50000;
    }

    #result {
      display: none;
      margin-top: 20px;
      background: #fff3cd;
      padding: 15px;
      border-radius: 10px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <header>
    <h1>مطعم الكوثر</h1>
    <p>نظام حجز الطلبات أونلاين</p>
  </header>

  <div class="box">
    <h2>احجز طلبك الآن</h2>

    <label>اسم الزبون</label>
    <input type="text" id="name" placeholder="اكتب اسمك">

    <label>رقم الهاتف</label>
    <input type="tel" id="phone" placeholder="مثال: 0590000000">

    <label>اختر الوجبة</label>
    <select id="meal">
      <option value="" data-price="0">-- اختر الوجبة --</option>
      <option value="شاورما دجاج" data-price="15">شاورما دجاج - 15 شيكل</option>
      <option value="برجر لحم" data-price="20">برجر لحم - 20 شيكل</option>
      <option value="وجبة بروست" data-price="25">وجبة بروست - 25 شيكل</option>
      <option value="بيتزا صغيرة" data-price="18">بيتزا صغيرة - 18 شيكل</option>
      <option value="مشاوي" data-price="35">مشاوي - 35 شيكل</option>
    </select>

    <label>الكمية</label>
    <input type="number" id="quantity" value="1" min="1">

    <label>نوع الطلب</label>
    <select id="orderType">
      <option value="استلام من المطعم">استلام من المطعم</option>
      <option value="توصيل للبيت">توصيل للبيت</option>
    </select>

    <label>وقت الاستلام أو التوصيل</label>
    <input type="time" id="time">

    <label>ملاحظات</label>
    <textarea id="notes" placeholder="مثال: بدون بصل، زيادة صوص..."></textarea>

    <button onclick="makeOrder()">تأكيد الطلب</button>

    <div id="result"></div>
  </div>

  <script>
    function makeOrder() {
      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let meal = document.getElementById("meal");
      let mealName = meal.value;
      let mealPrice = Number(meal.options[meal.selectedIndex].dataset.price);
      let quantity = Number(document.getElementById("quantity").value);
      let orderType = document.getElementById("orderType").value;
      let time = document.getElementById("time").value;
      let notes = document.getElementById("notes").value;
      let result = document.getElementById("result");

      if (name === "" || phone === "" || mealName === "" || time === "") {
        alert("من فضلك املأ الاسم ورقم الهاتف والوجبة والوقت");
        return;
      }

      let deliveryFee = 0;

      if (orderType === "توصيل للبيت") {
        deliveryFee = 5;
      }

      let total = mealPrice * quantity + deliveryFee;

      result.style.display = "block";

      result.innerHTML =
        "<strong>تم تسجيل طلبك بنجاح</strong><br>" +
        "الاسم: " + name + "<br>" +
        "رقم الهاتف: " + phone + "<br>" +
        "الوجبة: " + mealName + "<br>" +
        "سعر الوجبة: " + mealPrice + " شيكل<br>" +
        "الكمية: " + quantity + "<br>" +
        "نوع الطلب: " + orderType + "<br>" +
        "رسوم التوصيل: " + deliveryFee + " شيكل<br>" +
        "الوقت: " + time + "<br>" +
        "الملاحظات: " + notes + "<br>" +
        "<strong>الإجمالي: " + total + " شيكل</strong>";
    }
  </script>

</body>
</html>
